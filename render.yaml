# Render configuration for ProgressEd
# Serviços:
# - Backend Node (Express)
# - PostgreSQL database (progress-ed-db)

services:
  - type: web
    name: progress-ed-backend
    runtime: node
    region: oregon
    plan: starter
    buildCommand: "npm install"
    startCommand: "npm start"
    envVars:
      - key: NODE_ENV
        value: "production"
      - key: PORT
        value: "5000"
      - key: DATABASE_URL
        fromDatabase:
          name: progress-ed-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
    autoDeploy: true
    # Caminho onde está o package.json do backend
    rootDir: backend

  - type: postgresql
    name: progress-ed-db
    region: oregon
    plan: starter
    # Render cria o DATABASE_URL automaticamente para o serviço acima

