version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: progressd-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-progressd}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - progressd-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: progressd-backend
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-progressd}
      JWT_SECRET: ${JWT_SECRET:-sua-chave-secreta-super-segura}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
    command: npm start
    networks:
      - progressd-network
    environment:
      # Variável de configuração para múltiplas plataformas
      PLATFORM: docker

  frontend:
    image: node:18-alpine
    container_name: progressd-frontend
    working_dir: /app
    environment:
      VITE_API_URL: http://localhost:5000/api
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend
    networks:
      - progressd-network

  nginx:
    image: nginx:alpine
    container_name: progressd-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    networks:
      - progressd-network

networks:
  progressd-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
